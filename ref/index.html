<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora ref</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>CALCULADORA REFATORADA</h1>
    <h2>Uso do Select e Switch case</h2>
    <main>
        <input type="number" placeholder="Insira o primeiro número" id="n1">
        <input type="number" placeholder="Insira o segundo número" id="n2">
        <select id="op">
            <option value="+">Adição (+)</option>
            <option value="-">Subtração (-)</option>
            <option value="*">Multiplicação (x)</option>
            <option value="/">Divisão (/)</option>
        </select>
        <button onclick="calc()">CALCULAR</button>
        <p id="res"></p>
    </main>

    <script src="script.js"></script>
</body>

</html>
