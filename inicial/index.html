<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Calculadora</h1>
    <main>
        <div>
            <h2>Soma</h2>
            <label for="numero">Digite um número</label>
            <input type="number" id="numero1">
            <label for="numero">Digite outro número</label>
            <input type="number" id="numero2">
            <button onclick="somar()">Calcular</button>
            <p id="respSoma"></p>
        </div>
        <div>
            <h2>Subtração</h2>
            <label for="numero">Digite um número</label>
            <input type="number" id="numero3">
            <label for="numero">Digite outro número</label>
            <input type="number" id="numero4">
            <button onclick="sub()">Calcular</button>
            <p id="respSub"></p>
        </div>
        <div>
            <h2>Multiplicação</h2>
            <label for="numero">Digite um número</label>
            <input type="number" id="numero5">
            <label for="numero">Digite outro número</label>
            <input type="number" id="numero6">
            <button onclick="mult()">Calcular</button>
            <p id="respMult"></p>
        </div>
        <div>
            <h2>Divisão</h2>
            <label for="numero">Digite um número</label>
            <input type="number" id="numero7">
            <label for="numero">Digite outro número</label>
            <input type="number" id="numero8">
            <button onclick="div()">Calcular</button>
            <p id="respDiv"></p>
        </div>
    </main>

    <script src="script.js"> </script>
</body>

</html>
